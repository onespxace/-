<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>ZTBU - 维度入口 (黄金版)</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Microsoft YaHei', sans-serif; }
        canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; outline: none; }
        
        /* UI 层 */
        #ui-layer {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10;
            pointer-events: none;
            display: flex; flex-direction: column; justify-content: flex-end; align-items: center;
            padding-bottom: 50px;
        }

        #input-video { display: none; }

        /* 子程序容器 */
        .app-container {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 20;
            opacity: 0; pointer-events: none; transition: opacity 0.8s cubic-bezier(0.16, 1, 0.3, 1);
            transform: scale(0.9); transition: transform 0.8s, opacity 0.8s;
            background: #000;
        }
        .app-container.active {
            opacity: 1; pointer-events: auto; transform: scale(1);
        }
        .app-iframe { width: 100%; height: 100%; border: none; }

        /* 退出按钮 */
        .close-btn {
            position: absolute; top: 20px; right: 20px; z-index: 30;
            background: rgba(255, 215, 0, 0.2); border: 1px solid rgba(255, 215, 0, 0.5);
            color: #ffd700; padding: 10px 20px; border-radius: 30px; cursor: pointer;
            backdrop-filter: blur(10px); font-weight: bold; transition: 0.3s;
            display: none;
        }
        .close-btn:hover { background: rgba(255, 215, 0, 0.4); box-shadow: 0 0 15px #ffd700; }

        /* 提示与状态 */
        #status-text {
            color: rgba(255, 215, 0, 0.8); font-size: 14px; margin-bottom: 10px;
            text-shadow: 0 0 10px rgba(255, 170, 0, 0.8); letter-spacing: 2px;
            background: rgba(0,0,0,0.6); padding: 5px 15px; border-radius: 20px;
            border: 1px solid rgba(255, 215, 0, 0.3);
        }
        
        #btn-start-cam {
            pointer-events: auto;
            background: linear-gradient(90deg, #ffd700, #ff8c00);
            border: none; padding: 15px 40px; color: black; font-weight:bold; font-size: 18px; border-radius: 50px;
            cursor: pointer; box-shadow: 0 0 20px rgba(255, 140, 0, 0.6);
            transition: 0.5s; margin-bottom: 20px;
        }
        #btn-start-cam:hover { box-shadow: 0 0 40px rgba(255, 215, 0, 1); transform: scale(1.05); }

        .nav-menu { pointer-events: auto; display: flex; gap: 20px; margin-top: 20px; }
        .nav-btn {
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,215,0,0.5); color: #ffd700;
            padding: 8px 20px; border-radius: 4px; cursor: pointer; transition: 0.3s;
        }
        .nav-btn:hover { background: #ffd700; color: black; box-shadow: 0 0 15px #ffd700; }

        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 100;
            display: flex; justify-content: center; align-items: center; color: #ffd700; font-size: 24px; letter-spacing: 5px;
            transition: opacity 1s;
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/EffectComposer.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/RenderPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/ShaderPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/postprocessing/UnrealBloomPass.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/CopyShader.js"></script>
    <script src="https://unpkg.com/three@0.128.0/examples/js/shaders/LuminosityHighPassShader.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="loader">初始化黄金量子场...</div>
    <video id="input-video"></video>

    <div id="ui-layer">
        <div id="status-text">系统待机 - 等待手势接入</div>
        <button id="btn-start-cam" onclick="startExperience()">开启神经连接 (摄像头)</button>
        
        <div class="nav-menu" id="fallback-nav">
            <button class="nav-btn" onclick="forceEnterApp('genshin')">手动进入：原神祈愿</button>
            <button class="nav-btn" onclick="forceEnterApp('draw')">手动进入：幸运抽奖</button>
        </div>
    </div>

    <div id="app-genshin" class="app-container">
        <button class="close-btn" onclick="exitApp()">× 断开连接</button>
        <iframe id="frame-genshin" class="app-iframe" src="456.html"></iframe>
    </div>

    <div id="app-draw" class="app-container">
        <button class="close-btn" onclick="exitApp()">× 断开连接</button>
        <iframe id="frame-draw" class="app-iframe" src="chouren.html"></iframe>
    </div>

<script>
// ==========================================
// 1. Three.js 场景搭建
// ==========================================

const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x000000, 0.001);

const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
// 调整相机位置，离得远一点，这样大字也能看全
camera.position.z = 120; 

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(window.devicePixelRatio);
document.body.appendChild(renderer.domElement);

// 添加 OrbitControls 允许用户调整视角
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.enableDamping = true; 
controls.dampingFactor = 0.05;
controls.enableZoom = true; // 允许缩放
controls.autoRotate = false; // 默认不自动旋转，逻辑里控制

// 后期处理 (Bloom - 辉光效果)
const renderScene = new THREE.RenderPass(scene, camera);
// 稍微调高阈值和强度，让金色更亮
const bloomPass = new THREE.UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
bloomPass.threshold = 0;
bloomPass.strength = 1.8; // 增强辉光
bloomPass.radius = 0.8;

const composer = new THREE.EffectComposer(renderer);
composer.addPass(renderScene);
composer.addPass(bloomPass);

// ==========================================
// 2. 粒子系统 (耀眼金色)
// ==========================================

const PARTICLE_COUNT = 4000; // 稍微增加粒子数，让字更清晰
const geometry = new THREE.TetrahedronGeometry(0.6); 

// 金色材质配置
const material = new THREE.MeshPhysicalMaterial({
    color: 0xffd700,        // 纯金
    emissive: 0xff8800,     // 自发光橙金色
    emissiveIntensity: 1.5, // 发光强度
    metalness: 1.0,         // 金属感
    roughness: 0.1,         // 光滑度
    transmission: 0.2,
    transparent: true,
    opacity: 0.9,
    side: THREE.DoubleSide
});

const mesh = new THREE.InstancedMesh(geometry, material, PARTICLE_COUNT);
scene.add(mesh);

const dummy = new THREE.Object3D();
const positions = []; 
const targetPositions = []; 
const speeds = [];

for (let i = 0; i < PARTICLE_COUNT; i++) {
    positions.push((Math.random()-0.5)*300, (Math.random()-0.5)*300, (Math.random()-0.5)*300);
    targetPositions.push(positions[i*3], positions[i*3+1], positions[i*3+2]);
    speeds.push(0.02 + Math.random() * 0.04);
}

// 灯光系统
const ambientLight = new THREE.AmbientLight(0x222222);
scene.add(ambientLight);

// 金色主光源
const mainLight = new THREE.PointLight(0xffdd00, 2, 500);
mainLight.position.set(50, 50, 50);
scene.add(mainLight);

// 补光
const rimLight = new THREE.PointLight(0xffaa00, 2, 500);
rimLight.position.set(-50, 0, 50);
scene.add(rimLight);

// ==========================================
// 3. 字体点阵生成器
// ==========================================
function getTextPoints(text, size = 100) {
    const canvas = document.createElement('canvas');
    const ctx = canvas.getContext('2d');
    canvas.width = 600; // 画布加大
    canvas.height = 300;
    
    ctx.fillStyle = '#000000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    
    ctx.font = `bold ${size}px "Microsoft YaHei"`;
    ctx.fillStyle = '#ffffff';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(text, canvas.width / 2, canvas.height / 2);

    const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    const data = imageData.data;
    const points = [];

    // 采样
    const gap = 3; // 密度
    for (let y = 0; y < canvas.height; y += gap) { 
        for (let x = 0; x < canvas.width; x += gap) {
            const index = (y * canvas.width + x) * 4;
            if (data[index] > 128) { 
                points.push({
                    x: (x - canvas.width / 2) * 0.6, // 调整缩放系数
                    y: -(y - canvas.height / 2) * 0.6, 
                    z: 0
                });
            }
        }
    }
    return points;
}

// 预生成形状
const SHAPES = {
    SPHERE: [],
    ZTBU: getTextPoints('ZTBU', 100),
    GENSHIN: getTextPoints('原 神', 120),
    KHAN: getTextPoints('可汗大点兵', 80),
};

// 球体形状
for(let i=0; i<PARTICLE_COUNT; i++) {
    const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
    const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
    SHAPES.SPHERE.push({
        x: 40 * Math.cos(theta) * Math.sin(phi),
        y: 40 * Math.sin(theta) * Math.sin(phi),
        z: 40 * Math.cos(phi)
    });
}

// ==========================================
// 4. 逻辑控制与动画
// ==========================================

let currentState = 'IDLE'; 
let idleMode = 0; // 0: Sphere, 1: ZTBU
let lastHandPosition = new THREE.Vector3(0,0,0);
let handDetected = false;

// 待机自动切换形状
setInterval(() => {
    if(currentState === 'IDLE' && !handDetected) {
        idleMode = (idleMode + 1) % 2;
        updateTargetPoints(idleMode === 0 ? SHAPES.SPHERE : SHAPES.ZTBU, 1.0);
    }
}, 5000);

function updateTargetPoints(shapePoints, scale = 1.0) {
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const point = shapePoints[i % shapePoints.length];
        targetPositions[i * 3] = point.x * scale + (Math.random() - 0.5) * 2; 
        targetPositions[i * 3 + 1] = point.y * scale + (Math.random() - 0.5) * 2;
        targetPositions[i * 3 + 2] = point.z * scale + (Math.random() - 0.5) * 5; 
    }
}

function animate() {
    requestAnimationFrame(animate);
    controls.update(); // 更新控制器

    // 旋转逻辑：只有在 IDLE (球体/Logo) 状态下旋转，显示文字时正对屏幕
    if (currentState === 'IDLE') {
        scene.rotation.y += 0.002;
    } else {
        // 平滑回正到 0
        scene.rotation.y += (0 - scene.rotation.y) * 0.05;
    }

    // 粒子移动
    for (let i = 0; i < PARTICLE_COUNT; i++) {
        const ix = i * 3, iy = i * 3 + 1, iz = i * 3 + 2;
        
        positions[ix] += (targetPositions[ix] - positions[ix]) * speeds[i];
        positions[iy] += (targetPositions[iy] - positions[iy]) * speeds[i];
        positions[iz] += (targetPositions[iz] - positions[iz]) * speeds[i];

        dummy.position.set(positions[ix], positions[iy], positions[iz]);
        
        // 粒子自转 (闪烁感)
        dummy.rotation.x += 0.02;
        dummy.rotation.y += 0.02;

        dummy.updateMatrix();
        mesh.setMatrixAt(i, dummy.matrix);
    }
    mesh.instanceMatrix.needsUpdate = true;
    composer.render();
}

animate();

// ==========================================
// 5. MediaPipe 手势
// ==========================================
const videoElement = document.getElementById('input-video');
const statusText = document.getElementById('status-text');

function onResults(results) {
    if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        handDetected = true;
        const landmarks = results.multiHandLandmarks[0];
        
        const isThumbUp = landmarks[4].y < landmarks[3].y;
        const isIndexUp = landmarks[8].y < landmarks[6].y;
        const isMiddleUp = landmarks[12].y < landmarks[10].y;
        const isRingUp = landmarks[16].y < landmarks[14].y;
        const isPinkyUp = landmarks[20].y < landmarks[18].y;

        let gesture = 'UNKNOWN';
        
        if (isThumbUp && isPinkyUp && !isIndexUp && !isMiddleUp && !isRingUp) gesture = 'SIX';
        else if (isIndexUp && isMiddleUp && !isRingUp && !isPinkyUp) gesture = 'TWO';
        else if (isIndexUp && isMiddleUp && isRingUp && isPinkyUp) gesture = 'OPEN';
        else if (!isIndexUp && !isMiddleUp && !isRingUp && !isPinkyUp) gesture = 'FIST';

        handleGestureLogic(gesture);

    } else {
        handDetected = false;
        if(currentState !== 'APP_ACTIVE') currentState = 'IDLE';
    }
}

function handleGestureLogic(gesture) {
    if (currentState === 'APP_ACTIVE') {
        if (gesture === 'FIST') exitApp();
        return;
    }

    if (gesture === 'SIX') {
        if(currentState !== 'GESTURE_6') {
            currentState = 'GESTURE_6';
            // 确保场景回正
            scene.rotation.y = 0; 
            updateTargetPoints(SHAPES.GENSHIN, 1.5);
            statusText.innerText = "识别手势：6 -> 检测到原神信号 (张手确认)";
        }
    } 
    else if (gesture === 'TWO') {
        if(currentState !== 'GESTURE_2') {
            currentState = 'GESTURE_2';
            scene.rotation.y = 0;
            updateTargetPoints(SHAPES.KHAN, 1.5);
            statusText.innerText = "识别手势：2 -> 检测到点兵信号 (张手确认)";
        }
    }
    else if (gesture === 'OPEN') {
        if (currentState === 'GESTURE_6') enterApp('genshin');
        else if (currentState === 'GESTURE_2') enterApp('draw');
    }
    else if (gesture === 'FIST') {
        if (currentState !== 'IDLE') {
            currentState = 'IDLE';
            statusText.innerText = "系统待机";
            updateTargetPoints(SHAPES.SPHERE);
        }
    }
}

// ==========================================
// 6. 应用切换
// ==========================================

function enterApp(appId) {
    currentState = 'APP_ACTIVE';
    statusText.innerText = "正在连接目标宇宙...";
    
    // 粒子爆炸效果
    for(let i=0; i<PARTICLE_COUNT; i++) {
        targetPositions[i*3] *= 10;
        targetPositions[i*3+1] *= 10;
        targetPositions[i*3+2] += 500; 
    }

    setTimeout(() => {
        document.getElementById(`app-${appId}`).classList.add('active');
        document.querySelectorAll('.close-btn').forEach(b => b.style.display = 'block');
        document.getElementById('btn-start-cam').style.display = 'none';
        document.getElementById('fallback-nav').style.display = 'none';
        
        // 刷新iframe以重新加载
        const frame = document.getElementById(`frame-${appId}`);
        frame.src = frame.src; 
    }, 800);
}

function exitApp() {
    document.querySelectorAll('.app-container').forEach(el => el.classList.remove('active'));
    document.querySelectorAll('.close-btn').forEach(b => b.style.display = 'none');
    
    setTimeout(() => {
        currentState = 'IDLE';
        statusText.innerText = "连接断开，系统重置";
        updateTargetPoints(SHAPES.SPHERE);
        document.getElementById('btn-start-cam').style.display = 'block';
        document.getElementById('fallback-nav').style.display = 'flex';
    }, 800);
}

function forceEnterApp(appId) {
    currentState = appId === 'genshin' ? 'GESTURE_6' : 'GESTURE_2';
    scene.rotation.y = 0;
    updateTargetPoints(appId === 'genshin' ? SHAPES.GENSHIN : SHAPES.KHAN, 1.5);
    setTimeout(() => enterApp(appId), 1500);
}

// 摄像头启动
const hands = new Hands({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`});
hands.setOptions({ maxNumHands: 1, modelComplexity: 1, minDetectionConfidence: 0.7, minTrackingConfidence: 0.5 });
hands.onResults(onResults);

const cameraUtils = new Camera(videoElement, {
    onFrame: async () => { await hands.send({image: videoElement}); },
    width: 640, height: 480
});

function startExperience() {
    document.getElementById('btn-start-cam').innerText = "正在初始化神经链路...";
    cameraUtils.start().then(() => {
        document.getElementById('btn-start-cam').style.display = 'none';
        statusText.innerText = "链路接通。请做出手势：[6]原神 [2]点兵";
    }).catch(err => {
        alert("无法访问摄像头。请使用本地服务器(localhost)运行或检查权限。");
        document.getElementById('btn-start-cam').innerText = "启动失败";
    });
}

window.onload = () => {
    document.getElementById('loader').style.opacity = 0;
    setTimeout(() => document.getElementById('loader').style.display = 'none', 1000);
    updateTargetPoints(SHAPES.SPHERE);
};

window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
    bloomPass.resolution.set(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
